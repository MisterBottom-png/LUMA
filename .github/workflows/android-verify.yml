name: Android verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make wrapper executable
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Android lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luma-test-reports-${{ github.run_number }}
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: luma-debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
